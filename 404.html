<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect trick
    // Redirige /bullpadel vers /?/bullpadel puis index.html gère le routing
    const path = window.location.pathname;
    window.location.replace('/?redirect=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
